[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["custom_components/peek_it_ha"]
omit = []

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "from __future__ import annotations",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ASYNC"]
ignore = [
    "E501",     # line too long — managed by formatter
    "B008",     # function default in arg (HA uses this pattern often)
    "ASYNC109", # `timeout` arg here is the per-request HTTP timeout, not a deadline
]
