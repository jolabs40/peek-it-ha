get_templates:
  name: Get templates
  description: Retrieves the list of available templates from all configured Peek-it [TV] devices.

get_sounds:
  name: Get sounds
  description: Retrieves the list of available sounds (official + custom) from all configured Peek-it [TV] devices. Use the returned names in the notification "sound" field.

notify:
  name: Send notification
  description: Sends a rich notification to Peek-it [TV] devices (sound, TTS, animations, templates). By default it targets ALL configured TVs; use the Target field to send to specific ones. Supports 3 modes — simple message, template_id + params, or full JSON elements. Returns a per-TV delivery status (delivered / reason / fallback / http_status) usable via response_variable.
  fields:
    target:
      name: Target device(s)
      description: Limit the notification to specific Peek-it [TV] device(s). Leave empty to send to ALL configured TVs (default — backwards compatible).
      required: false
      selector:
        device:
          integration: peek_it_ha
          multiple: true
    message:
      name: Message
      description: Text to display (simple message mode).
      required: false
      example: "Hello World"
      selector:
        text:
    title:
      name: Title
      description: Optional title (simple message mode).
      required: false
      example: "Info"
      selector:
        text:
    position:
      name: Position
      description: "Vertical placement of the simple message (presets mode). Default: bottom."
      required: false
      selector:
        select:
          options:
            - "top"
            - "center"
            - "bottom"
    level:
      name: Level
      description: Severity preset (simple message mode) — picks an accent color and a default icon.
      required: false
      selector:
        select:
          options:
            - "info"
            - "warning"
            - "alert"
    icon:
      name: Icon
      description: Material Design Icon shown above the message (e.g. "mdi:bell"). Overrides the level icon.
      required: false
      example: "mdi:bell-ring"
      selector:
        text:
    color:
      name: Accent color
      description: Accent color (hex) for the icon and title in simple/presets mode (e.g. "#18BCF2").
      required: false
      example: "#18BCF2"
      selector:
        text:
    image_url:
      name: Image URL
      description: Image to display (simple mode) — remote http(s) URL, data:base64 or local path. Use case — a doorbell camera snapshot.
      required: false
      example: "http://192.168.1.50/snapshot.jpg"
      selector:
        text:
    image_fit:
      name: Image fit
      description: "How the image fills its box. Default: contain."
      required: false
      selector:
        select:
          options:
            - "contain"
            - "cover"
            - "fill"
    template_id:
      name: Template ID
      description: UUID of the template to use (copied from the Designer).
      required: false
      example: "70c3f0c7-ac0c-4b09-838a-e116ce9c9a11"
      selector:
        text:
    params:
      name: Parameters
      description: "Parameter values (paramKey) or {{placeholders}} of the template (key: value)."
      required: false
      example:
        title: "Welcome"
        message: "Hello"
      selector:
        object:
    elements:
      name: Elements
      description: Full JSON element list (advanced mode, copied from the Designer).
      required: false
      selector:
        object:
    duration:
      name: Duration
      description: Display duration in milliseconds.
      required: false
      default: 10000
      example: 15000
      selector:
        number:
          min: 1000
          max: 300000
          step: 1000
          unit_of_measurement: ms
          mode: box
    action:
      name: Action
      description: Action to perform (DISPLAY or CLOSE).
      required: false
      default: "DISPLAY"
      selector:
        select:
          options:
            - "DISPLAY"
            - "CLOSE"
    priority:
      name: Priority
      description: >-
        Notification priority hint sent to the TV. Currently advisory — the app
        logs it but does NOT bypass Do Not Disturb yet (planned app-side). Does
        not change queueing.
      required: false
      selector:
        select:
          options:
            - "normal"
            - "urgent"
    animationIn:
      name: Entrance animation
      description: Appearance animation.
      required: false
      selector:
        select:
          options:
            - "fade"
            - "slide_right"
            - "slide_left"
            - "slide_bottom"
            - "slide_top"
            - "pop"
            - "none"
    animationOut:
      name: Exit animation
      description: Disappearance animation.
      required: false
      selector:
        select:
          options:
            - "fade"
            - "slide_right"
            - "slide_left"
            - "slide_bottom"
            - "slide_top"
            - "pop"
            - "none"
    sound:
      name: Sound
      description: >-
        Sound file name to play with the notification. Built-in sounds:
        01_notify.wav … 05_notify.wav, 06-notify.ogg, 07-notify.ogg,
        08-notify.mp3, 09-notify.mp3, 10-notify.mp3. Custom uploaded sounds
        also work. Call the get_sounds service to list what a TV exposes.
      required: false
      example: "01_notify.wav"
      selector:
        text:
    soundVolume:
      name: Sound volume
      description: Sound volume (0.0 to 1.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.1
          mode: slider
    tts:
      name: TTS text
      description: Text-to-speech message to read aloud with the notification.
      required: false
      example: "Motion detected in the garden"
      selector:
        text:
    ttsLang:
      name: TTS language
      description: TTS language code (e.g. "en", "fr", "de"). Defaults to the Home Assistant language if omitted.
      required: false
      example: "fr"
      selector:
        text:
    ttsSpeed:
      name: TTS speed
      description: TTS speech rate (0.5 to 2.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 2.0
          step: 0.1
          mode: slider
    ttsPitch:
      name: TTS pitch
      description: TTS voice pitch (0.5 to 2.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 2.0
          step: 0.1
          mode: slider
    ttsVolume:
      name: TTS volume
      description: TTS volume (0.0 to 1.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.1
          mode: slider

tts:
  name: Text-to-speech
  description: Sends a text-to-speech message to Peek-it [TV] devices. By default it targets ALL configured TVs; use the Target field to send to specific ones. Returns a per-TV delivery status usable via response_variable.
  fields:
    target:
      name: Target device(s)
      description: Limit the TTS to specific Peek-it [TV] device(s). Leave empty to send to ALL configured TVs (default).
      required: false
      selector:
        device:
          integration: peek_it_ha
          multiple: true
    text:
      name: Text
      description: Text to speak aloud.
      required: true
      example: "Dinner is ready!"
      selector:
        text:
    lang:
      name: Language
      description: Language code (e.g. "en", "fr", "de", "es"). Defaults to the Home Assistant language if omitted.
      required: false
      example: "fr"
      selector:
        text:
    speed:
      name: Speed
      description: Speech rate (0.5 to 2.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 2.0
          step: 0.1
          mode: slider
    pitch:
      name: Pitch
      description: Voice pitch (0.5 to 2.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 2.0
          step: 0.1
          mode: slider
    volume:
      name: Volume
      description: TTS volume (0.0 to 1.0).
      required: false
      default: 1.0
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.1
          mode: slider

tts_stop:
  name: Stop TTS
  description: Stops any ongoing text-to-speech playback on Peek-it [TV] devices. By default it targets ALL configured TVs; use the Target field to stop specific ones.
  fields:
    target:
      name: Target device(s)
      description: Limit the stop command to specific Peek-it [TV] device(s). Leave empty to stop on ALL configured TVs (default).
      required: false
      selector:
        device:
          integration: peek_it_ha
          multiple: true

dismiss:
  name: Dismiss notification
  description: Closes the current (top-most) notification overlay on Peek-it [TV] devices — a readable shortcut for action CLOSE. By default it targets ALL configured TVs; use the Target field for specific ones.
  fields:
    target:
      name: Target device(s)
      description: Limit the dismissal to specific Peek-it [TV] device(s). Leave empty for ALL configured TVs (default).
      required: false
      selector:
        device:
          integration: peek_it_ha
          multiple: true
    notification_id:
      name: Notification ID
      description: >-
        (Reserved) ID of a specific persistent notification to close. Sent only
        if provided; ignored by current app versions, which always close the
        top-most overlay. Targeted close is pending app support.
      required: false
      selector:
        text:
